<!DOCTYPE HTML>
<div id="run">
<textarea id="code" autocorrect="off" form="run" name="code"></textarea>
<textarea id="input" autocorrect="off" form="run" name="input"></textarea>
<textarea readonly id="output"></textarea>
<input id="flag" type="text" name="flag"/>
<input id="submit" type="button" value="Run"/>
</div>
<script>
window.post = function(url, data) {
  return fetch(url, {method: "POST", headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
}
async function doit() {
    let promise = post(`${document.URL}interpret/`, {'code': document.getElementById("code").value, 'input': document.getElementById("input").value, 'flag': document.getElementById("flag").value})
    let response = await promise.then(function(response){return response.text();})
    document.getElementById("output").value = response
}
document.getElementById("submit").onclick=async() => {
  await doit();
};
</script>
